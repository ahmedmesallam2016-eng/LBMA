    <style>

        /* باقي أنماط النظام */
        .app-container { max-width: 650px; margin: 0 auto; width: 100%; padding: 24px 20px 20px; }
        .header { text-align: center; margin-bottom: 32px; position: relative; display: flex; flex-direction: column; align-items: center; }
        .header h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(120deg, #1f6e43, #2a9d6e); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 12px; }
        .logout-btn { background: #eef2f8; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; color: #2d4a6e; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 12px; transition: 0.2s; }

        .card:active { transform: scale(0.98); }
        .card-header { padding: 20px 24px 14px; display: flex; align-items: center; gap: 14px; border-bottom: 2px solid rgba(0,0,0,0.05);}
        .card-header i { font-size: 2rem; }

        .stats-preview { padding: 18px 22px 22px; }
        .progress-bar-bg { background: #e4eaf2; border-radius: 60px; height: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #2b8c5e, #48c78e); width: 0%; height: 100%; border-radius: 60px; }
        .row-stats { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
        .mini-badges { display: flex; gap: 12px; margin-top: 16px; }
        .badge { background: #ffffffcc; backdrop-filter: blur(4px); padding: 8px 0; border-radius: 60px; font-size: 0.7rem; font-weight: 600; text-align: center; flex: 1; border: 1px solid #ffffff; }
        .badge span { font-size: 1.3rem; font-weight: 800; display: block; line-height: 1.3; }
        .detail-view { background: rgba(255, 255, 255, 0.96); border-radius: 44px; padding: 22px 20px 30px; box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12); }
        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid #e9edf2; padding-bottom: 16px; }
        .detail-header h2 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #1f5e3a, #328f66); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .btn-back, .btn-add { border: none; padding: 10px 18px; border-radius: 60px; font-weight: 700; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .btn-back { background: #eef2f8; color: #2d4a6e; }
        .btn-add { background: #2b8c5e; color: white; width: 100%; justify-content: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(43,140,94,0.2); }
        .tasks-list { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
        .task-card { background: #ffffff; border-radius: 32px; padding: 18px; box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03), 0 0 0 1px #edf2f7; transition: all 0.2s; }
        .task-title { font-weight: 800; font-size: 1rem; margin-bottom: 14px; padding-right: 6px; border-right: 4px solid #2b8c5e; padding-right: 12px; display: flex; justify-content: space-between; align-items: center; }
        .delete-task { background: none; border: none; color: #c7a1a1; font-size: 1.2rem; padding: 6px 8px; cursor: pointer; }
        .task-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin: 12px 0 8px; }
        .check-wrapper, .progress-wrapper, .date-wrapper { background: #f0f4fa; padding: 6px 12px; border-radius: 40px; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 500; }
        .progress-wrapper input, .date-wrapper input { border: 1px solid #cbdbe0; border-radius: 30px; padding: 5px; text-align: center; background: white; width: 70px; }
        .task-notes { margin-top: 12px; background: #fafdff; border-radius: 28px; padding: 10px 14px; font-size: 0.75rem; border: 1px solid #e2e8f0; width: 100%; resize: vertical; font-family: inherit; }
        .empty-state { text-align: center; padding: 48px 20px; background: #f9fbfe; border-radius: 48px; color: #8ba0b5; }
        .info-message { background: #eef6e8; padding: 12px 18px; border-radius: 28px; font-size: 0.75rem; margin-bottom: 20px; color: #2b6e4e; }
        .loader { text-align: center; padding: 30px; color: #2b8c5e; }
        .footer-note { font-size: 0.7rem; text-align: center; margin-top: 28px; margin-bottom: 15px; color: #8fa0b3; }
        .hidden { display: none; }
        @media (max-width: 480px) {
            .app-container { padding: 18px 14px 20px; }
            .task-controls { flex-direction: column; align-items: stretch; }
            .progress-wrapper input, .date-wrapper input { width: auto; }
            .login-footer { width: 95%; padding: 10px; }
        }
        .main-footer {
            text-align: center;
            font-size: 0.7rem;
            color: #7d8e9e;
            margin-top: 25px;
            padding: 12px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

<!-- المحتوى الرئيسي -->
<div id="mainContent" style="display: none;">
    <div class="app-container">
        <div id="mainPage">
            <div class="header">
                <h1><i class="fas fa-leaf"></i> تقارير المتابعة</h1>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                <p>نظام متابعة المصادر المسؤولة | LBMA</p>

                <i class="fas fa-crown"></i> إعداد وتصميم م/ أحمد مسلم

                    <h2 id="detailTitle"><i class="fas fa-clipboard"></i> المهام</h2>

                <div id="infoMessage" class="info-message hidden"></div>
                <button class="btn-add" id="addTaskBtn"><i class="fas fa-plus"></i> إضافة مهمة جديدة</button>
                <div id="tasksContainer" class="tasks-list"></div>
            </div>

<script>
    // ========== إعدادات Firebase ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDo6I2UThmoMD24ANC7GWLDkT0aagJPk24",
        authDomain: "lbma-task-system.firebaseapp.com",
        projectId: "lbma-task-system",
        storageBucket: "lbma-task-system.firebasestorage.app",
        messagingSenderId: "535913870353",
        appId: "1:535913870353:web:10ebc3ffa137d8c5856db0"
    };

    let db = null;
    let firestoreReady = false;

    try {
        const app = firebase.initializeApp(firebaseConfig);
        db = firebase.firestore(app);
        firestoreReady = true;
        console.log("✅ Firebase initialized");
    } catch (e) {
        console.error("❌ Firebase init error", e);
    }

    // ========== البيانات الافتراضية للأقسام ==========
    const DEPT_KEYS = {
        finance: "dept_finance",
        legal: "dept_legal",
        engineering: "dept_engineering"
    };
    
    const defaultFinance = [
        { id: "fin1", name: "إصدار سياسة Responsible Sourcing معتمدة", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "fin2", name: "إجراء KYC للتجار (تعريف العميل)", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "fin3", name: "نموذج تصنيف مخاطر التاجر والدفعة", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "fin4", name: "آلية فحص القوائم السوداء والعقوبات", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "fin5", name: "إجراء الدفعات المشبوهة (تجميد/رفع)", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "fin6", name: "سجل الموردين المعتمدين والمعاملات", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "fin7", name: "تدريب الموظفين على النظام وتوثيقه", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "fin8", name: "استمارات فتح التاجر وتقييم المخاطر", completed: false, progress: 0, dueDate: "", notes: "" }
    ];
    
    const defaultLegal = [
        { id: "leg1", name: "مستندات التأسيس والسجل التجاري", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "leg2", name: "هيكل الملكية والمفوضين بالتوقيع", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "leg3", name: "القوائم المالية المدققة والمراجع", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "leg4", name: "خطابات الدعم البنكية والمؤسسية", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "leg5", name: "التفويضات الرسمية للتقديم", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "leg6", name: "قوائم التحقق القانونية والمالية", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "leg7", name: "نموذج متابعة صلاحية التراخيص", completed: false, progress: 0, dueDate: "", notes: "" }
    ];
    
    const defaultEngineering = [
        { id: "eng1", name: "معايرة أجهزة ICP/XRF والميزانيات", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "eng2", name: "إجراءات أخذ العينات وفق LBMA", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "eng3", name: "توثيق إجراءات التشغيل SOPs", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "eng4", name: "التحقق من المواد المرجعية CRMs", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "eng5", name: "سجل الصيانة الوقائية", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "eng6", name: "تدريب على اختبار الكفاءة PT", completed: false, progress: 0, dueDate: "", notes: "" },
        { id: "eng7", name: "السلامة الكيميائية وإدارة النفايات", completed: false, progress: 0, dueDate: "", notes: "" }
    ];

    // ========== متغيرات الأداء والتخزين المؤقت ==========
    let cachedAllData = null;           // التخزين المؤقت للبيانات
    let saveTimeout = null;             // مؤقت للحفظ المؤجل
    const SAVE_DELAY_MS = 600;          // تأخير الحفظ (مللي ثانية)
    let currentDept = null;
    let currentTasksArray = [];

    // ========== دوال التخزين (مع Cache) ==========
    async function loadAllData(forceRefresh = false) {
        if (!forceRefresh && cachedAllData !== null) {
            return cachedAllData;
        }
        
        if (!firestoreReady || !db) {
            let data = loadFromLocal();
            cachedAllData = data;
            return data;
        }
        
        try {
            const docRef = db.collection("lbma_system").doc("tasksData");
            const docSnap = await docRef.get();
            let data;
            if (docSnap.exists) {
                data = docSnap.data();
            } else {
                data = {
                    [DEPT_KEYS.finance]: defaultFinance,
                    [DEPT_KEYS.legal]: defaultLegal,
                    [DEPT_KEYS.engineering]: defaultEngineering
                };
                await docRef.set(data);
            }
            cachedAllData = data;
            saveToLocal(data);
            return data;
        } catch (e) {
            console.error("خطأ في تحميل البيانات من Firebase", e);
            let data = loadFromLocal();
            cachedAllData = data;
            return data;
        }
    }

    function loadFromLocal() {
        let stored = localStorage.getItem("RSP_Final_V3");
        if (stored) return JSON.parse(stored);
        return {
            [DEPT_KEYS.finance]: defaultFinance,
            [DEPT_KEYS.legal]: defaultLegal,
            [DEPT_KEYS.engineering]: defaultEngineering
        };
    }

    function saveToLocal(data) {
        localStorage.setItem("RSP_Final_V3", JSON.stringify(data));
    }

    async function saveAllDataDebounced(data) {
        cachedAllData = data;
        saveToLocal(data);
        
        if (saveTimeout) clearTimeout(saveTimeout);
        
        saveTimeout = setTimeout(async () => {
            if (firestoreReady && db) {
                try {
                    await db.collection("lbma_system").doc("tasksData").set(data);
                    console.log("✅ تم الحفظ في Firebase بعد توقف التعديلات");
                } catch (e) {
                    console.error("خطأ في حفظ Firebase", e);
                }
            }
            saveTimeout = null;
        }, SAVE_DELAY_MS);
    }

    // حفظ التغييرات الحالية بدون إعادة تحميل كامل
    async function saveCurrentAndUpdateTasks(updateUI = true) {
        if (!currentDept) return;
        
        if (!cachedAllData) {
            cachedAllData = await loadAllData();
        }
        cachedAllData[currentDept] = [...currentTasksArray];
        
        await saveAllDataDebounced(cachedAllData);
        
        if (updateUI) {
            renderTasksFromArray();
        }
    }

    // ========== دوال الإحصائيات ==========
    function getStats(tasks) {
        let total = tasks.length;
        let completed = tasks.filter(t => t.completed).length;
        let inProgress = total - completed;
        let percent = total === 0 ? 0 : Math.round((completed / total) * 100);
        return { total, completed, inProgress, percent };
    }

    // ========== عرض البطاقات الرئيسية ==========
    async function renderCards() {
        const grid = document.getElementById("departmentsGrid");
        if (!grid) return;
        const data = await loadAllData(false);
        const deptsInfo = [
            { key: DEPT_KEYS.finance, title: "الإدارة المالية والمبيعات", icon: "fa-chart-simple", color: "#e9a23b", bgLight: "#fff7eb" },
            { key: DEPT_KEYS.legal, title: "الإدارة القانونية", icon: "fa-building", color: "#2c7a5e", bgLight: "#eef6f2" },
            { key: DEPT_KEYS.engineering, title: "إدارة المعمل والهندسية", icon: "fa-flask", color: "#3f83c4", bgLight: "#ecf3fa" }
        ];
        grid.innerHTML = "";
        for (let d of deptsInfo) {
            const tasks = data[d.key] || [];
            const stat = getStats(tasks);
            const card = document.createElement("div");
            card.className = "card";
            card.setAttribute("data-key", d.key);
            card.setAttribute("data-title", d.title);
            card.onclick = () => openDetail(d.key, d.title);
            card.innerHTML = `
                <div class="card-header" style="background:${d.bgLight}">
                    <i class="fas ${d.icon}" style="color:${d.color}"></i>
                    <h2>${d.title}</h2>
                </div>
                <div class="stats-preview">
                    <div class="row-stats"><span>📋 إجمالي المهام</span><strong>${stat.total}</strong></div>
                    <div class="row-stats"><span>✅ المنجزة</span><strong>${stat.completed}</strong></div>
                    <div class="row-stats"><span>🔄 قيد العمل (المتبقية)</span><strong>${stat.inProgress}</strong></div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width:${stat.percent}%"></div></div>
                    <div class="mini-badges">
                        <div class="badge"><span>${stat.completed}</span> منجزة</div>
                        <div class="badge"><span>${stat.inProgress}</span> قيد العمل</div>
                        <div class="badge"><span>${stat.percent}%</span> إنجاز</div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }
    }

    // ========== فتح تفاصيل القسم ==========
    async function openDetail(key, title) {
        document.getElementById("mainPage").classList.add("hidden");
        document.getElementById("detailPage").classList.remove("hidden");
        document.getElementById("detailTitle").innerHTML = `<i class="fas fa-tasks"></i> ${title}`;
        currentDept = key;
        const all = cachedAllData ? cachedAllData : await loadAllData();
        currentTasksArray = all[key] ? [...all[key]] : [];
        const infoDiv = document.getElementById("infoMessage");
        if (key === DEPT_KEYS.engineering) {
            infoDiv.innerHTML = "🧪 تم إعداد مهام نموذجية للمعمل والهندسة. يمكنك إضافة المهام أو تعديلها بسهولة (حفظ سحابي).";
            infoDiv.classList.remove("hidden");
        } else {
            infoDiv.classList.add("hidden");
        }
        renderTasksFromArray();
    }

    // ========== عرض المهام (مع تحديث تفاضلي) ==========
    function renderTasksFromArray() {
        const container = document.getElementById("tasksContainer");
        if (!currentTasksArray.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-feather-alt"></i><br/>لا توجد مهام بعد<br/><span style="font-size:0.7rem;">أضف مهمة جديدة بالضغط على الزر</span></div>`;
            return;
        }
        
        // خريطة البطاقات الموجودة
        const existingCards = new Map();
        Array.from(container.children).forEach(card => {
            const taskId = card.getAttribute("data-task-id");
            if (taskId) existingCards.set(taskId, card);
        });
        
        const fragment = document.createDocumentFragment();
        
        for (let task of currentTasksArray) {
            let taskDiv = existingCards.get(task.id);
            const isNew = !taskDiv;
            
            if (isNew) {
                taskDiv = document.createElement("div");
                taskDiv.className = "task-card";
                taskDiv.setAttribute("data-task-id", task.id);
                buildTaskCardStructure(taskDiv);
            }
            
            updateTaskCardContent(taskDiv, task);
            
            if (isNew) {
                attachTaskEvents(taskDiv, task);
                fragment.appendChild(taskDiv);
            } else {
                // إزالة من الخريطة حتى لا نحذفها لاحقاً
                existingCards.delete(task.id);
            }
        }
        
        container.appendChild(fragment);
        
        // حذف البطاقات التي لم تعد موجودة
        for (let card of existingCards.values()) {
            card.remove();
        }
    }
    
    function buildTaskCardStructure(card) {
        card.innerHTML = `
            <div class="task-title">
                <span></span>
                <button class="delete-task"><i class="fas fa-trash-alt"></i></button>
            </div>
            <div class="task-controls">
                <label class="check-wrapper"><input type="checkbox" class="task-complete"> <span>تم الإنجاز</span></label>
                <div class="progress-wrapper"><span>📊 التقدم</span><input type="number" class="task-progress" min="0" max="100" step="5"><span>%</span></div>
                <div class="date-wrapper"><i class="fas fa-calendar-alt"></i><input type="date" class="task-date"></div>
            </div>
            <textarea class="task-notes" placeholder="ملاحظات إضافية ..." rows="1"></textarea>
        `;
    }
    
    function updateTaskCardContent(card, task) {
        const titleSpan = card.querySelector(".task-title span");
        if (titleSpan) titleSpan.textContent = escapeHtml(task.name);
        
        const chk = card.querySelector(".task-complete");
        const prog = card.querySelector(".task-progress");
        const dateInp = card.querySelector(".task-date");
        const notesArea = card.querySelector(".task-notes");
        
        if (chk) chk.checked = task.completed;
        if (prog) prog.value = task.progress;
        if (dateInp) dateInp.value = task.dueDate || "";
        if (notesArea) notesArea.value = task.notes || "";
    }
    
    function attachTaskEvents(card, task) {
        const chk = card.querySelector(".task-complete");
        const prog = card.querySelector(".task-progress");
        const dateInp = card.querySelector(".task-date");
        const notesArea = card.querySelector(".task-notes");
        const delBtn = card.querySelector(".delete-task");
        
        const handleChange = async () => {
            await saveCurrentAndUpdateTasks(true);
        };
        
        if (chk) {
            chk.addEventListener("change", async (e) => {
                task.completed = e.target.checked;
                if (task.completed) {
                    task.progress = 100;
                    if (prog) prog.value = 100;
                    if (!task.dueDate) {
                        task.dueDate = new Date().toISOString().split('T')[0];
                        if (dateInp) dateInp.value = task.dueDate;
                    }
                } else if (task.progress === 100) {
                    task.progress = 0;
                }
                await saveCurrentAndUpdateTasks(true);
            });
        }
        
        if (prog) {
            prog.addEventListener("change", async (e) => {
                let val = parseInt(e.target.value) || 0;
                val = Math.min(100, Math.max(0, val));
                task.progress = val;
                if (val === 100) {
                    task.completed = true;
                    if (chk) chk.checked = true;
                    if (!task.dueDate) {
                        task.dueDate = new Date().toISOString().split('T')[0];
                        if (dateInp) dateInp.value = task.dueDate;
                    }
                } else if (task.completed && val < 100) {
                    task.completed = false;
                }
                await saveCurrentAndUpdateTasks(true);
            });
        }
        
        if (dateInp) {
            dateInp.addEventListener("change", async (e) => {
                task.dueDate = e.target.value;
                await saveCurrentAndUpdateTasks(true);
            });
        }
        
        if (notesArea) {
            notesArea.addEventListener("change", async (e) => {
                task.notes = e.target.value;
                await saveCurrentAndUpdateTasks(true);
            });
        }
        
        if (delBtn) {
            delBtn.addEventListener("click", async () => {
                if (confirm("حذف المهمة؟")) {
                    currentTasksArray = currentTasksArray.filter(t => t.id !== task.id);
                    await saveCurrentAndUpdateTasks(true);
                }
            });
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== إضافة مهمة جديدة ==========
    async function addNewTask() {
        let newName = prompt("أدخل اسم المهمة الجديدة:");
        if (!newName || newName.trim() === "") return;
        const newTask = {
            id: Date.now() + "_" + Math.random().toString(36).substring(2),
            name: newName.trim(),
            completed: false,
            progress: 0,
            dueDate: "",
            notes: ""
        };
        currentTasksArray.push(newTask);
        await saveCurrentAndUpdateTasks(true);
    }
    
    function goBack() {
        document.getElementById("detailPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");
        renderCards(); // تحديث الإحصائيات عند العودة فقط
    }
    
    // ========== التحقق من كلمة المرور (من Firestore) ==========
    async function verifyPassword(inputPassword) {
        if (!firestoreReady || !db) {
            return inputPassword === "admin123";
        }
        try {
            const configRef = db.collection("config").doc("access");
            const docSnap = await configRef.get();
            if (docSnap.exists) {
                const storedPassword = docSnap.data().password;
                return inputPassword === storedPassword;
            } else {
                await configRef.set({ password: "LBMA@2025" });
                return inputPassword === "LBMA@2025";
            }
        } catch (error) {
            console.error("خطأ في التحقق من كلمة المرور", error);
            return false;
        }
    }
    
    // ========== إدارة الدخول والخروج ==========
    async function showDashboard() {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        await renderCards();
        
        // ربط الأحداث بطريقة آمنة (إزالة القديمة)
        const backBtn = document.getElementById("backBtn");
        const addBtn = document.getElementById("addTaskBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        
        const newBack = backBtn.cloneNode(true);
        const newAdd = addBtn.cloneNode(true);
        const newLogout = logoutBtn.cloneNode(true);
        
        backBtn.parentNode.replaceChild(newBack, backBtn);
        addBtn.parentNode.replaceChild(newAdd, addBtn);
        logoutBtn.parentNode.replaceChild(newLogout, logoutBtn);
        
        newBack.addEventListener("click", goBack);
        newAdd.addEventListener("click", addNewTask);
        newLogout.addEventListener("click", () => {
            if (confirm("تسجيل الخروج والعودة إلى صفحة الدخول؟")) {
                sessionStorage.removeItem("loggedIn");
                location.reload();
            }
        });
    }
    
    const enterBtn = document.getElementById("enterBtn");
    const pwdInput = document.getElementById("passwordInput");
    const loginErrorDiv = document.getElementById("loginError");
    const firebaseLoadingDiv = document.getElementById("firebaseLoading");
    
    async function handleLogin() {
        const enteredPwd = pwdInput.value;
        if (!enteredPwd) {
            loginErrorDiv.innerText = "الرجاء إدخال كلمة المرور";
            loginErrorDiv.classList.remove("hidden");
            return;
        }
        loginErrorDiv.classList.add("hidden");
        firebaseLoadingDiv.classList.remove("hidden");
        enterBtn.disabled = true;
        
        const isValid = await verifyPassword(enteredPwd);
        firebaseLoadingDiv.classList.add("hidden");
        enterBtn.disabled = false;
        
        if (isValid) {
            sessionStorage.setItem("loggedIn", "true");
            await showDashboard();
        } else {
            loginErrorDiv.innerText = "كلمة المرور غير صحيحة";
            loginErrorDiv.classList.remove("hidden");
        }
    }
    
    enterBtn.addEventListener("click", handleLogin);
    pwdInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleLogin(); });
    
    // بدء التشغيل
    if (sessionStorage.getItem("loggedIn") === "true" && firestoreReady) {
        showDashboard().catch(() => { sessionStorage.removeItem("loggedIn"); location.reload(); });
    } else {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("mainContent").style.display = "none";
    }
</script>
